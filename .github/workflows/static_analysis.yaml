name: Static analysis

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/static_analysis.yaml
      - auraxis_macros/**
      - auraxis/**
      - Cargo.toml
      - Cargo.lock
      - rust-toolchain.toml
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/static_analysis.yaml
      - auraxis_macros/**
      - auraxis/**
      - Cargo.toml
      - Cargo.lock
      - rust-toolchain.toml

  workflow_dispatch:

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  clippy:
    name: Cargo Clippy
    runs-on: ubuntu-latest

    strategy:
      matrix:
        target: [x86_64-unknown-linux-gnu]

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Install Rust toolchain
        run: |
          rustup update
          rustup toolchain install $(cat rust-toolchain.toml | grep channel | cut -d '"' -f 2)
          rustup default $(cat rust-toolchain.toml | grep channel | cut -d '"' -f 2)
          rustup component add clippy

      - name: Cache target directory
        id: cache-target
        uses: actions/cache/restore@v5
        with:
          path: target
          key: ${{ matrix.target }}-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Run Clippy
        run: cargo clippy --all-features --release -- -D warnings
